<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-container">
      <h1>Login</h1>
      <div class="login">
        <input
          type="text"
          id="name"
          class="name"
          placeholder="Enter your name"
        />
        <input
          type="password"
          id="password"
          class="password"
          placeholder="Enter your password"
        />

        <button id="login_btn" class="login_btn">Login</button>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
